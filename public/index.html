<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>docsvault</title>
  <link rel="stylesheet" href="style.css">
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      if (t === 'light') document.getElementById('hljs-theme').href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
    })();
  </script>
</head>
<body class="landing">

  <div id="landing">
    <header class="landing-header">
      <div id="vault-selector" class="vault-selector hidden" role="tablist" aria-label="Vault auswählen"></div>
      <button id="landing-theme" class="theme-toggle-floating" title="Theme wechseln">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </header>
    <div class="landing-content">
      <div class="logo-wrap">
        <img src="logo.png" alt="intex" class="logo-img">
      </div>
      <h1>Stelle eine Frage zur Dokumentation</h1>
      <p class="subtitle">Durchsuche API-Referenzen, Handbücher, HowTos und interne Regeln</p>
      <a href="/help/" class="help-link">Wie installiere ich es?</a>
    </div>
    <div class="session-status" id="session-status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span>Wird alles vorbereitet...</span>
    </div>
    <div class="input-area landing-input">
      <div class="input-box">
        <textarea id="landing-input" placeholder="Wo stehst du auf dem Schlauch?" rows="1" maxlength="2000" disabled></textarea>
        <div class="input-controls">
          <button id="landing-speed" class="speed-toggle" data-mode="fast" title="Schnell">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span>Schnell</span>
          </button>
          <button id="landing-send" class="send-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="chat" style="display:none;">
    <header id="chat-header">
      <div class="header-left">
        <img src="logo.png" alt="intex" class="header-logo-img">
        <span class="header-title">docsvault</span>
        <span id="vault-badge" class="vault-badge hidden" aria-label="Aktiver Vault">
          <span class="vault-badge-dot"></span>
          <span class="vault-badge-name"></span>
        </span>
      </div>
      <div class="header-right">
        <button id="btn-theme" class="header-btn" title="Theme wechseln">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button id="btn-install" class="header-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Installieren</span>
        </button>
        <button id="btn-report" class="header-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="8" height="14" rx="4"/><path d="M6 10H4"/><path d="M6 18H4"/><path d="M6 14H4"/><path d="M18 10h2"/><path d="M18 18h2"/><path d="M18 14h2"/><path d="M8 6a4 4 0 0 1 8 0"/><path d="M12 6v4"/></svg>
          <span>Bug melden</span>
        </button>
        <button id="btn-new-chat" class="header-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Neuer Chat</span>
        </button>
      </div>
    </header>

    <div id="messages"></div>

    <!-- bug report overlay -->
    <div id="report-overlay" class="overlay hidden">
      <div class="overlay-box">
        <h3>Bug melden</h3>
        <p class="overlay-desc">Beschreibe was passiert ist. Der Chat-Verlauf wird automatisch mitgeschickt.</p>
        <textarea id="report-text" placeholder="Was ist passiert?" rows="4"></textarea>
        <p id="report-error" class="overlay-error hidden"></p>
        <div class="overlay-actions">
          <button id="report-cancel" class="overlay-btn">Abbrechen</button>
          <button id="report-send" class="overlay-btn primary">Senden</button>
        </div>
      </div>
    </div>

    <div class="input-area chat-input">
      <div class="input-box">
        <textarea id="chat-input" placeholder="Wo stehst du auf dem Schlauch?" rows="1" maxlength="2000"></textarea>
        <div class="input-controls">
          <button id="chat-speed" class="speed-toggle" data-mode="fast" title="Schnell">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span>Schnell</span>
          </button>
          <button id="chat-send" class="send-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js" integrity="sha512-xeUh+KxNyTufZOje++oQHstlMQ8/rpyzPuM+gjMFYK3z5ILJGE7l2NvYL+XfliKURMpBIKKp1XoPN/qswlSMFA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" integrity="sha512-D9gUyxqja7hBtkWpPWGt9wfbfaMGVt9gnyCvYa+jojwwPHLCzUm5i8rpk7vD7wNee9bA35eYIjobYPaQuKS1MQ==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" integrity="sha512-jB0TkTBeQC9ZSkBqDhdmfTv1qdfbWpGE72yJ/01Srq6hEzZIz2xkz1e57p9ai7IeHMwEG7HpzG6NdptChif5Pg==" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
